function addPlane(w,h,pos,rot,mat,shadow=false) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w,h), mat);
  m.position.set(...pos); m.rotation.set(...rot);
  if(shadow) m.receiveShadow = true;
  scene.add(m); return m;
}

// Build each room
ROOMS.forEach(room => {
  const { z, depth, width } = room;
  const cz = z - depth/2;
  const h = 4.8;
  // Floor
  addPlane(width, depth, [0,0,cz], [-Math.PI/2,0,0], floorMat, true);
  // Ceiling
  addPlane(width, depth, [0,h,cz], [Math.PI/2,0,0], ceilMat);
  // Left wall
  addPlane(depth, h, [-width/2,h/2,cz], [0,Math.PI/2,0], wallMat, true);
  // Right wall
  addPlane(depth, h, [width/2,h/2,cz], [0,-Math.PI/2,0], wallMat, true);
});

ROOMS.forEach(room => {
  const { z, depth, width } = room;
  const cz = z - depth/2;

  bbR.position.set(width/2-0.01, bbH/2, cz); scene.add(bbR);
});

// Transition walls (partial walls between rooms with doorway gaps)
function addDoorwayWall(z, totalWidth, gapWidth) {
  const sideW = (totalWidth - gapWidth) / 2;
  if (sideW > 0.1) {
    addPlane(sideW, 4.8, [-(gapWidth/2 + sideW/2), 2.4, z], [0,0,0], wallMat);
    addPlane(sideW, 4.8, [(gapWidth/2 + sideW/2), 2.4, z], [0,0,0], wallMat);
  }
}

function addFrame(fw, fh, pos, ry, hasDarkCanvas=false) {
  const g = new THREE.Group();
  const t=0.035, d=0.025;
  const barH = new THREE.BoxGeometry(fw+t*2, t, d);
  const barV = new THREE.BoxGeometry(t, fh, d);
  [fh/2, -fh/2].forEach(y => { const m=new THREE.Mesh(barH,frameMat); m.position.y=y; m.castShadow=true; g.add(m); });
  [-fw/2, fw/2].forEach(x => { const m=new THREE.Mesh(barV,frameMat); m.position.x=x; m.castShadow=true; g.add(m); });
  const cvs = new THREE.Mesh(new THREE.PlaneGeometry(fw-0.02, fh-0.02), hasDarkCanvas ? darkCanvasMat : canvasMat);
  cvs.position.z = -0.005; g.add(cvs);
  g.position.set(...pos); g.rotation.y = ry;
  scene.add(g); return g;
}

function addFrameWithImage(fw, fh, pos, ry, imageUrl) {

      tex.colorSpace = THREE.SRGBColorSpace;
      const imgMat = new THREE.MeshStandardMaterial({ map:tex, roughness:0.85 });
      const cvs = g.children.find(c => c.geometry?.type === 'PlaneGeometry');
      if(cvs) cvs.material = imgMat;

  }
  return g;
}

// Toolkit
spot(0,4.5,-88, 0,1.8,-88.9, 3);
spot(-3,4.5,-80, -6.4,1.8,-80, 2);
spot(4,4.5,-82, 4,1.8,-82, 1.5);
pointL(0,3.5,-82, 0.3, 18, 0xf0f0ff);

// Guestbook
spot(-2,4.5,-93, -5.4,1.8,-93, 2.5);
spot(0,4.5,-101, 0,1.8,-101.9, 2.5);
pointL(0,3,-95, 0.4, 18, 0xfff0d6);

// ════════════════════════════════════════
// PARTICLES
// ════════════════════════════════════════
const PC=200;
const pp=new Float32Array(PC*3), pv=new Float32Array(PC*3);
for(let i=0;i<PC;i++){
  pp[i*3]=(Math.random()-0.5)*14; pp[i*3+1]=Math.random()*4.5; pp[i*3+2]=Math.random()*-104;
  pv[i*3]=(Math.random()-0.5)*0.002; pv[i*3+1]=(Math.random()-0.5)*0.001; pv[i*3+2]=(Math.random()-0.5)*0.001;
}
const pg=new THREE.BufferGeometry(); pg.setAttribute('position',new THREE.BufferAttribute(pp,3));
const pm=new THREE.PointsMaterial({color:0xffffff,size:0.02,transparent:true,opacity:0.3,sizeAttenuation:true,depthWrite:false});
const particles=new THREE.Points(pg,pm); scene.add(particles);

// ════════════════════════════════════════
// NAVIGATION STATE
// ════════════════════════════════════════
let currentVP = 0;
let isAnimating = false;
let autoTourActive = false;
let autoTourTimer = null;

const panelEl = document.getElementById('exhibit-panel');
const panelContent = document.getElementById('panel-content');
const roomLabel = document.getElementById('room-label');
const vpCounter = document.getElementById('vp-counter');

function showPanel(panelId, position) {
  if(!panelId || !PANELS[panelId]) { hidePanel(); return; }
  panelEl.className = `pos-${position||'right'}`;
  panelContent.innerHTML = `<button class="panel-close" onclick="document.getElementById('exhibit-panel').classList.remove('open')">&times;</button>` + PANELS[panelId].html;
  requestAnimationFrame(() => panelEl.classList.add('open'));
}
function hidePanel() { panelEl.classList.remove('open'); }

function goToViewpoint(index, duration=1.8) {
  if(isAnimating || index<0 || index>=VIEWPOINTS.length) return;
  isAnimating = true;
  hidePanel();

  const vp = VIEWPOINTS[index];
  const targetPos = new THREE.Vector3(...vp.pos);
  const targetLook = new THREE.Vector3(...vp.look);

  // Disable controls during animation
  controls.enabled = false;

  // Smooth look-target interpolation
  const currentLook = controls.target.clone();

  // Animate camera position
  gsap.to(camera.position, {
    x:targetPos.x, y:targetPos.y, z:targetPos.z,
    duration, ease:'power2.inOut',
    onComplete: () => {
      controls.target.copy(targetLook);
      controls.enabled = true;
      controls.update();
      isAnimating = false;
      currentVP = index;
      updateUI();
      if(vp.panel) setTimeout(() => showPanel(vp.panel, vp.panelPos), 400);
    }
  });

  // Animate look-at target (drives camera.lookAt each frame)
  gsap.to(currentLook, {
    x:targetLook.x, y:targetLook.y, z:targetLook.z,
    duration, ease:'power2.inOut',
    onUpdate: () => { controls.target.copy(currentLook); }
  });

  currentVP = index;
  updateUI();
}

function updateUI() {
  const vp = VIEWPOINTS[currentVP];
  const room = ROOMS.find(r => r.id === vp.room);
  roomLabel.textContent = `[ ${String(currentVP).padStart(2,'0')}. ${vp.label} ]`;
  vpCounter.textContent = `${String(currentVP+1).padStart(2,'0')} / ${VIEWPOINTS.length}`;

  document.getElementById('nav-prev').classList.toggle('disabled', currentVP <= 0);
  document.getElementById('nav-next').classList.toggle('disabled', currentVP >= VIEWPOINTS.length-1);

  // Update fog color per room
  if(room) {
    const col = new THREE.Color(room.color);
    scene.fog.color.lerp(col, 0.5);
    scene.background.lerp(col, 0.5);
  }

  drawMinimap();
}

// ════════════════════════════════════════
// MINIMAP
// ════════════════════════════════════════
function drawMinimap() {
  const c = document.getElementById('minimap-canvas');
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);

  const scale = 1.1;
  const ox = c.width/2, oy = 10;

  // Draw rooms
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ROOMS.forEach(room => {
    const x = ox - (room.width/2)*scale;
    const y = oy + (-room.z)*scale;
    const w = room.width*scale;
    const h = room.depth*scale;
    ctx.strokeRect(x, y, w, h);
  });

  // Room labels
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = '6px monospace';
  ctx.textAlign = 'center';
  ROOMS.forEach(room => {
    const y = oy + (-room.z - room.depth/2)*scale;
    ctx.fillText(room.id.toUpperCase().slice(0,3), ox, y+2);
  });

  // Current position
  const vp = VIEWPOINTS[currentVP];
  const px = ox + vp.pos[0]*scale;
  const py = oy + (-vp.pos[2])*scale;
  ctx.beginPath();
  ctx.arc(px, py, 3, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  // Direction indicator
  const lx = ox + vp.look[0]*scale;
  const ly = oy + (-vp.look[2])*scale;
  ctx.beginPath();
  ctx.moveTo(px,py);
  const angle = Math.atan2(ly-py, lx-px);
  ctx.lineTo(px+Math.cos(angle)*8, py+Math.sin(angle)*8);
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

// ════════════════════════════════════════
// EVENT HANDLERS
// ════════════════════════════════════════

// Nav arrows
document.getElementById('nav-prev').addEventListener('click', () => { stopAutoTour(); goToViewpoint(currentVP - 1); });
document.getElementById('nav-next').addEventListener('click', () => { stopAutoTour(); goToViewpoint(currentVP + 1); });

// Keyboard
document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'||e.key==='d') { stopAutoTour(); goToViewpoint(currentVP+1); }
  if(e.key==='ArrowLeft'||e.key==='a') { stopAutoTour(); goToViewpoint(currentVP-1); }
  if(e.key==='Escape') hidePanel();
});

// Instructions
document.getElementById('instructions').addEventListener('click', () => {
  document.getElementById('instructions').classList.add('hidden');
});

// Auto tour
function startAutoTour() {
  autoTourActive = true;
  document.getElementById('auto-tour').classList.add('active');
  document.getElementById('auto-tour').textContent = 'Stop Tour';
  advanceAutoTour();
}
function stopAutoTour() {
  autoTourActive = false;
  clearTimeout(autoTourTimer);
  document.getElementById('auto-tour').classList.remove('active');
  document.getElementById('auto-tour').textContent = 'Auto Tour';
}
function advanceAutoTour() {
  if(!autoTourActive) return;
  const next = currentVP + 1;
  if(next >= VIEWPOINTS.length) { stopAutoTour(); return; }
  goToViewpoint(next, 2.2);
  const hasPanel = VIEWPOINTS[next].panel;
  autoTourTimer = setTimeout(advanceAutoTour, hasPanel ? 6000 : 3500);
}
document.getElementById('auto-tour').addEventListener('click', () => {
  if(autoTourActive) stopAutoTour();
  else startAutoTour();
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ════════════════════════════════════════
// ANIMATION LOOP
// ════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  controls.update();

  // Rotate sculptures
  sculptures.forEach((s,i) => {
    s.rotation.y = t*0.2 + i*1.5;
    s.rotation.x = Math.sin(t*0.15+i)*0.2;
    s.position.y += Math.sin(t*0.6+i*2)*0.0008;
  });

  // Particles
  const pa = particles.geometry.attributes.position.array;
  for(let i=0;i<PC;i++){
    pa[i*3]+=pv[i*3]; pa[i*3+1]+=pv[i*3+1]+Math.sin(t+i)*0.0002; pa[i*3+2]+=pv[i*3+2];
    if(Math.abs(pa[i*3])>8) pv[i*3]*=-1;
    if(pa[i*3+1]>4.5||pa[i*3+1]<0.2) pv[i*3+1]*=-1;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  renderer.render(scene, camera);
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
controls.target.set(0, 1.65, -5);
controls.update();
updateUI();

// Loader
const fill = document.getElementById('load-fill');
let lp = 0;
const li = setInterval(() => {
  lp += 12 + Math.random()*20;
  if(lp>=100) { lp=100; clearInterval(li); fill.style.width='100%'; setTimeout(()=>document.getElementById('loader').classList.add('done'),500); }
  fill.style.width = lp+'%';
}, 200);

animate();
</script>
